name: Actualizar Resultados Mundial 2026

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos durante el torneo
  workflow_dispatch:          # también se puede lanzar manualmente desde la pestaña Actions

permissions:
  contents: write             # necesario para hacer push de results.json

jobs:
  fetch-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ejecutar script de resultados
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: python scripts/fetch_results.py

      - name: Guardar results.json si cambió
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet && echo "Sin cambios" || git commit -m "chore: actualizar resultados [bot]"
          git push
