<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mundial FIFA 2026 · Calendario</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header>
  <span class="trophy">🏆</span>
  <h1>FIFA World Cup 2026</h1>
  <p class="subtitle">Horario Colombia (COT · UTC−5)</p>
  <div class="hosts">🇺🇸 🇲🇽 🇨🇦</div>
</header>

<div id="today-banner">
  <span id="banner-date">📅 Cargando...</span>
  <span class="sync-status">
    <span class="sync-dot loading" id="sync-dot"></span>
    <span id="sync-txt">Sincronizando...</span>
  </span>
</div>

<div class="nav"><div class="nav-inner" id="tabs"></div></div>

<main id="app">

  <div id="section-matches">
    <div class="phase-label">⚽ Fase de Grupos</div>
    <div id="matches-container"></div>
  </div>

  <div id="section-groups" style="display:none">
    <div class="phase-label">📊 Tabla de Grupos</div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot q1"></span>Clasifican directamente</span>
      <span class="legend-item"><span class="legend-dot q2"></span>Repechaje (3° mejor)</span>
    </div>
    <div class="groups-grid" id="groups-container"></div>
  </div>

  <div id="section-knockout" style="display:none">
    <div class="phase-label">🏆 Fases Finales</div>
    <div class="knockout-section" id="knockout-container"></div>
  </div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h3>Ingresar Resultado</h3>
    <div class="modal-teams" id="modal-teams"></div>
    <div class="score-inputs">
      <div class="score-input">
        <label id="lbl-home">Local</label>
        <input type="number" id="inp-home" min="0" max="99" placeholder="0"/>
      </div>
      <div class="score-sep">–</div>
      <div class="score-input">
        <label id="lbl-away">Visitante</label>
        <input type="number" id="inp-away" min="0" max="99" placeholder="0"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-clear" id="btn-clear">Borrar</button>
      <button class="btn-cancel" id="btn-cancel">Cancelar</button>
      <button class="btn-save" id="btn-save">Guardar ✓</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
